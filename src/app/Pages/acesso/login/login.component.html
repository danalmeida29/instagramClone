<mat-card class="card">
  <div class="card-body">
    <div class="card-title"></div>
    
    <form>
      <mat-form-field class="form-group">
        <input matInput
          type="email"  
          placeholder="E-mail"
        >
      </mat-form-field>
      <mat-form-field class="form-group">
        <input matInput
          type="password"
          placeholder="Senha"
        >
      </mat-form-field>
      <button mat-raised-button class="button" type="submit" color="primary">Entrar</button>
    </form>
    <hr/>

    <p class="small text-danger text-center" style="color: red;">O nome de usuário inserido não pertence a uma conta. Verifique seu nome de usuário e tente novamente.</p>

  </div>
</mat-card>
<br />
<mat-card class="card">
  <div class="card-body">
    <p class="card-text">
      Não tem uma conta? <a href="#" class="card-link">Cadastre-se</a>
    </p> 
  </div>
</mat-card>
